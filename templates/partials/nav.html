<!-- Sidebar Navigation -->
<!-- Mobile overlay -->
<div id="sidebar-overlay" class="hidden fixed inset-0 bg-black/50 z-40 lg:hidden" onclick="toggleSidebar()"></div>

<aside id="sidebar" class="fixed lg:static inset-y-0 left-0 z-50 w-64 bg-white dark:bg-surface-900 border-r border-slate-200 dark:border-slate-700/50 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out flex flex-col">

    <!-- Logo -->
    <div class="px-6 py-5 border-b border-slate-200 dark:border-slate-700/50">
        <a href="{% url 'core:dashboard' %}" class="flex items-center gap-3 group">
            <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center shadow-lg shadow-brand-500/25 group-hover:shadow-brand-500/40 transition-shadow">
                <span class="text-white font-bold text-sm">R</span>
            </div>
            <div>
                <h1 class="text-lg font-bold text-slate-800 dark:text-white tracking-tight">REx<span class="text-brand-500">.sane</span></h1>
                <p class="text-[10px] text-slate-400 dark:text-slate-500 -mt-0.5 font-medium tracking-wide uppercase">Budget Made Simple</p>
            </div>
        </a>
    </div>

    <!-- Nav Links -->
    <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
        <a href="{% url 'core:dashboard' %}"
           class="nav-link {% if active_page == 'dashboard' %}nav-link-active{% endif %}">
            <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
            <span>Dashboard</span>
        </a>
        <a href="{% url 'core:expenses' %}"
           class="nav-link {% if active_page == 'expenses' %}nav-link-active{% endif %}">
            <i data-lucide="receipt" class="w-5 h-5"></i>
            <span>Expenses</span>
        </a>
        <a href="{% url 'core:scratchpad' %}"
           class="nav-link {% if active_page == 'scratchpad' %}nav-link-active{% endif %}">
            <i data-lucide="notebook-pen" class="w-5 h-5"></i>
            <span>Scratchpad</span>
        </a>

        <div class="pt-4 pb-2">
            <p class="px-3 text-[10px] font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-wider">Settings</p>
        </div>

        <a href="{% url 'core:settings' %}"
           class="nav-link {% if active_page == 'settings' %}nav-link-active{% endif %}">
            <i data-lucide="settings" class="w-5 h-5"></i>
            <span>Budget Settings</span>
        </a>
    </nav>

    <!-- Footer: Dark Mode Toggle + Profile -->
    <div class="px-3 py-4 border-t border-slate-200 dark:border-slate-700/50 space-y-3">
        <!-- Dark Mode Toggle -->
        <button onclick="toggleDarkMode()" class="nav-link w-full" id="dark-mode-toggle">
            <i data-lucide="moon" class="w-5 h-5 dark:hidden"></i>
            <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
            <span class="dark:hidden">Dark Mode</span>
            <span class="hidden dark:block">Light Mode</span>
        </button>

        <!-- Profile Badge -->
        {% if profile %}
        <div class="flex items-center gap-3 px-3 py-2 rounded-xl bg-slate-50 dark:bg-surface-800">
            <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-400 to-brand-600 flex items-center justify-center">
                <span class="text-white font-semibold text-xs">{{ profile.name|make_list|first|upper }}</span>
            </div>
            <div class="min-w-0">
                <p class="text-sm font-medium text-slate-700 dark:text-slate-200 truncate">{{ profile.name }}</p>
                <p class="text-[10px] text-slate-400 dark:text-slate-500">{{ profile.needs_pct }}/{{ profile.wants_pct }}/{{ profile.savings_pct }} split</p>
            </div>
        </div>
        {% endif %}
    </div>
</aside>

<!-- Mobile hamburger button -->
<button onclick="toggleSidebar()" class="fixed top-4 left-4 z-30 lg:hidden bg-white dark:bg-surface-800 rounded-xl p-2 shadow-lg border border-slate-200 dark:border-slate-700" id="mobile-menu-btn">
    <i data-lucide="menu" class="w-5 h-5 text-slate-600 dark:text-slate-300"></i>
</button>
